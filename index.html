<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Release Tracker</h1>
    <div class="header-actions">
      <button type="button" id="selection-mode-toggle" class="btn btn-secondary">Selection Mode</button>
    </div>
  </header>

  <nav class="tab-nav" role="tablist">
    <button type="button" class="tab-btn active" data-tab="now-live" role="tab">Now Live</button>
    <button type="button" class="tab-btn" data-tab="pending" role="tab">Pending</button>
    <button type="button" class="tab-btn" data-tab="coming-soon" role="tab">Coming Soon</button>
    <button type="button" class="tab-btn" data-tab="on-the-horizon" role="tab">On the Horizon</button>
  </nav>

  <main class="main-content">
    <div id="loading" class="loading">Loading releases…</div>
    <div id="error" class="error" hidden></div>

    <section id="tab-now-live" class="tab-panel active" data-category="now_live" role="tabpanel">
      <div class="card-list" id="cards-now-live"></div>
    </section>
    <section id="tab-pending" class="tab-panel" data-category="pending" role="tabpanel">
      <div class="card-list" id="cards-pending"></div>
    </section>
    <section id="tab-coming-soon" class="tab-panel" data-category="coming_soon" role="tabpanel">
      <div class="card-list" id="cards-coming-soon"></div>
    </section>
    <section id="tab-on-the-horizon" class="tab-panel" data-category="on_the_horizon" role="tabpanel">
      <div class="card-list" id="cards-on-the-horizon"></div>
    </section>
  </main>

  <div id="selection-bar" class="selection-bar" hidden>
    <span class="selection-count" id="selection-count">0 cards selected</span>
    <div class="selection-actions">
      <button type="button" id="clear-selection" class="btn btn-secondary">Clear Selection</button>
      <button type="button" id="open-presentation" class="btn btn-primary" disabled>Open Presentation</button>
    </div>
  </div>

  <div id="presentation-slides-offscreen" style="position:absolute;left:-9999px;top:0;overflow:visible;pointer-events:none;" aria-hidden="true"></div>

  <div id="presentation-overlay" class="presentation-overlay" hidden>
    <div class="presentation-viewport">
      <div class="presentation-slide-container" id="presentation-slide-container"></div>
    </div>
    <div class="presentation-nav">
      <button type="button" id="slide-prev" class="btn btn-nav" aria-label="Previous slide">&larr;</button>
      <span class="slide-counter" id="slide-counter">1 / 1</span>
      <button type="button" id="slide-next" class="btn btn-nav" aria-label="Next slide">&rarr;</button>
      <button type="button" id="close-presentation" class="btn btn-secondary">Close</button>
    </div>
    <div class="presentation-export">
      <button type="button" id="export-current-slide" class="btn btn-secondary">Download Current Slide</button>
      <button type="button" id="export-all-slides" class="btn btn-secondary">Download All as Zip</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/presentation.js"></script>
</body>
</html>
